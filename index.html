<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="A minimal SB3 viewer powered by TurboWarp Scaffolding." />
    <title>TurboWasm Viewer</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('tw-viewer:settings:v1');
          var theme = 'system';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.theme) theme = parsed.state.theme;
          }
          var resolved = theme;
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          /* noop */
        }
      })();
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
